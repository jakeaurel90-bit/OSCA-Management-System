{% extends 'base.html' %}

{% block title %}Add New User{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-6 offset-md-3">
            <div class="card shadow">
                <div class="card-header bg-success text-white">
                    <h5 class="mb-0"><i class="bi bi-person-plus"></i> Create New Account</h5>
                </div>
                <div class="card-body">
                    <!-- Display form errors if they exist -->
                    {% if form.errors %}
                        <div class="alert alert-danger">
                            {{ form.errors }}
                        </div>
                    {% endif %}

                    <form method="post">
                        {% csrf_token %}
                        {{ form.as_p }}
                        
                        <!-- Admin Checkbox -->
                        <div class="mb-3 form-check">
                            <input type="checkbox" name="is_admin" class="form-check-input" id="isAdminCheck">
                            <label class="form-check-label" for="isAdminCheck">
                                Grant Administrative Privileges
                            </label>
                        </div>
                        
                        <div class="d-grid">
                            <button type="submit" class="btn btn-success">Create User</button>
                            <a href="{% url 'dashboard:users' %}" class="btn btn-secondary mt-2">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
