{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSCA Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header d-flex align-items-center p-3">
            <img src="{% static 'images/osca-logo.png' %}" alt="OSCA Logo" 
                 style="width: 45px; height: 45px; margin-right: 12px; object-fit: contain;">
            <h5 class="mb-0 fw-bold">OSCA</h5>
        </div>
        
        <hr class="text-white mx-3">
        
        <nav class="nav flex-column">
            <a class="nav-link" href="{% url 'dashboard:dashboard' %}"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
            <a class="nav-link" href="{% url 'dashboard:list_seniors' %}"><i class="bi bi-people me-2"></i> Senior Citizens</a>
            <a class="nav-link" href="{% url 'dashboard:add_senior' %}"><i class="bi bi-person-plus me-2"></i> Registration</a>
            <a class="nav-link" href="{% url 'dashboard:id_management' %}"><i class="bi bi-card-id me-2"></i> ID Management</a>
            <a class="nav-link" href="{% url 'dashboard:benefits' %}"><i class="bi bi-gift me-2"></i> Benefits</a>
            <a class="nav-link" href="{% url 'dashboard:birthday_celebrants' %}"><i class="bi bi-cake2 me-2"></i> Birthdays</a>
            <a class="nav-link" href="{% url 'dashboard:reports' %}"><i class="bi bi-graph-up me-2"></i> Reports</a>
            <a class="nav-link" href="{% url 'dashboard:activity_log' %}"><i class="bi bi-clock-history me-2"></i> Logs</a>
            <a class="nav-link" href="{% url 'dashboard:users' %}"><i class="bi bi-person-badge me-2"></i> Users</a>
            <a class="nav-link" href="{% url 'dashboard:settings' %}"><i class="bi bi-gear me-2"></i> Settings</a>
        </nav>
        
        <hr class="text-white mx-3">
        
        {% if user.is_authenticated %}
            <a class="nav-link text-danger fw-bold" href="{% url 'dashboard:logout' %}"><i class="bi bi-box-arrow-right me-2"></i> Logout</a>
        {% else %}
            <a class="nav-link text-success fw-bold" href="{% url 'dashboard:login' %}"><i class="bi bi-box-arrow-in-right me-2"></i> Login</a>
        {% endif %}
    </div>

    <div class="main-content">
        <nav class="navbar navbar-custom rounded shadow-sm mb-4">
            <div class="container-fluid">
                <span class="navbar-brand mb-0 h1 text-muted">Welcome, {{ user.username|default:"Admin" }}</span>
            </div>
        </nav>

        {% block content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
