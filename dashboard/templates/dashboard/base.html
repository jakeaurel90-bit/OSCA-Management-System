{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSCA Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        .sidebar { height: 100vh; width: 250px; position: fixed; background: #2c3e50; color: white; }
        .nav-link { color: #bdc3c7; }
        .nav-link:hover { color: white; background: #34495e; }
        .main-content { margin-left: 250px; }
        .navbar-custom { background-color: #ffffff; border-bottom: 1px solid #dee2e6; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header d-flex align-items-center p-3">
            <h5 class="mb-0 fw-bold">OSCA Management</h5>
        </div>
        <nav class="nav flex-column">
            <a class="nav-link" href="{% url 'dashboard:dashboard' %}"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
            <a class="nav-link" href="{% url 'dashboard:list_seniors' %}"><i class="bi bi-people me-2"></i> Senior Citizens</a>
            <a class="nav-link" href="{% url 'dashboard:add_senior' %}"><i class="bi bi-person-plus me-2"></i> Registration</a>
            <a class="nav-link" href="{% url 'dashboard:id_management' %}"><i class="bi bi-card-id me-2"></i> ID Management</a>
            <a class="nav-link" href="{% url 'dashboard:benefits' %}"><i class="bi bi-gift me-2"></i> Benefits</a>
            <a class="nav-link" href="{% url 'dashboard:reports' %}"><i class="bi bi-file-earmark-bar-graph me-2"></i> Reports</a>
            <a class="nav-link" href="{% url 'dashboard:settings' %}"><i class="bi bi-gear me-2"></i> Settings</a>
        </nav>
    </div>

    <div class="main-content">
        <!-- New Navbar -->
        <nav class="navbar navbar-custom px-4 py-2">
            <div class="container-fluid">
                <span class="navbar-brand"></span>
                <div class="d-flex">
                    {% if user.is_authenticated %}
                        <span class="me-3 mt-1 text-muted">Welcome, <strong>{{ user.username }}</strong></span>
                        <form action="{% url 'logout' %}" method="post">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-outline-danger btn-sm">Logout</button>
                        </form>
                    {% else %}
                        <a href="{% url 'login' %}" class="btn btn-outline-primary btn-sm">Login</a>
                    {% endif %}
                </div>
            </div>
        </nav>

        <div class="p-4">
            {% block content %}{% endblock %}
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
