{% extends 'dashboard/base.html' %}
{% block content %}
<div class="container mt-4">
    <h3>Edit User: {{ user_to_edit.username }}</h3>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a href="{% url 'dashboard:users' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
