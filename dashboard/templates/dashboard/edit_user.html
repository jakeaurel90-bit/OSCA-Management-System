{% extends 'dashboard/base.html' %}
{% block content %}
<div class="container mt-4">
    <div class="card p-4 shadow-sm">
        <h3 class="mb-4">Edit User: {{ user_to_edit.username }}</h3>
        <form method="post">
            {% csrf_token %}
            
            {{ form.as_p }}

            {% if request.user.is_superuser %}
            <div class="mb-3 p-3 border rounded bg-light">
                <label class="form-label fw-bold text-danger">Administrative Privileges</label>
                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" name="is_superuser" id="is_superuser" 
                           {% if user_to_edit.is_superuser %}checked{% endif %}>
                    <label class="form-check-label" for="is_superuser">Grant Full Super Admin Access</label>
                </div>
            </div>
            {% endif %}
            
            <div class="mt-3">
                <button type="submit" class="btn btn-primary px-4">Save Changes</button>
                <a href="{% url 'dashboard:users' %}" class="btn btn-secondary px-4">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
