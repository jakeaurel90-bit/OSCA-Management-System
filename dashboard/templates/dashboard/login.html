
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSCA Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        .sidebar { height: 100vh; width: 250px; position: fixed; background: #2c3e50; color: white; }
        .nav-link { color: #bdc3c7; }
        .nav-link:hover { color: white; background: #34495e; }
        .main-content { margin-left: 250px; }
        .navbar-custom { background-color: #ffffff; border-bottom: 1px solid #dee2e6; }
    </style>

    <div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow-sm border-0 mt-5">
            <div class="card-body p-4">
                <h2 class="text-center mb-4">Login</h2>
                
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-danger alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                    {% endfor %}
                {% endif %}
                
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" name="username" class="form-control" placeholder="Enter your username" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mb-3">Sign In</button>
                </form>

                <div class="text-center">
                    <p class="mb-0"><a href="{% url 'password_reset' %}" class="text-decoration-none">Forgot your password?</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
</head>
