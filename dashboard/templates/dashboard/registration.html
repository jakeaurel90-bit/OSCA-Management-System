{% extends 'dashboard/base.html' %}
{% block content %}
<div class="container-fluid p-4">
    <h2 class="mb-4 fw-bold">Register Senior Citizen</h2>
    <form method="POST" class="bg-white p-4 shadow-sm rounded border">
        {% csrf_token %}
        
        <div class="row mb-3">
            <div class="col-md-3"><label class="form-label">First Name <span class="text-danger"> *</span></label>
                <input type="text" name="first_name" class="form-control" required maxlength="30"></div>
            <div class="col-md-2"><label class="form-label">M.I.</label><input type="text" name="middle_initial" class="form-control" maxlength="2"></div>
            <div class="col-md-4"><label class="form-label">Last Name<span class="text-danger"> *</span></label><input type="text" name="last_name" class="form-control" required></div>
            <div class="col-md-3"><label class="form-label">Suffix</label><input type="text" name="suffix" class="form-control" placeholder="e.g. Jr, Sr"></div>
        </div>

        <div class="row mb-3">
            <div class="col-md-8"><label class="form-label">Address<span class="text-danger"> *</span></label><input type="text" name="address" class="form-control" required></div>
            <div class="col-md-4"><label class="form-label">Barangay<span class="text-danger"> *</span></label><input type="text" name="barangay" class="form-control" required></div>
        </div>

        <div class="row mb-3">
            <div class="col-md-4"><label class="form-label">Birthdate<span class="text-danger"> *</span></label><input type="date" name="birthdate" class="form-control" required></div>
            <div class="col-md-4">
                <label class="form-label">Sex</label>
                <select name="gender" class="form-select">
                    <option value="M">Male</option>
                    <option value="F">Female</option>
                </select>
            </div>
            <div class="col-md-4"><label class="form-label">Phone Number<span class="text-danger"> *</span></label>
                <input type="tel" name="phone_number" class="form-control" value="+63" required maxlength="16"></div>
        </div>

        <div class="mb-4">
            <label class="form-label fw-bold">Benefits & Services Enrollment</label>
            <div class="row p-3 border rounded bg-light">
                <div class="col-md-3 form-check form-check-inline">
                    <input class="form-check-input" type="checkbox" name="has_pension" id="pension">
                    <label class="form-check-label" for="pension">Pension</label>
                </div>
                <div class="col-md-3 form-check form-check-inline">
                    <input class="form-check-input" type="checkbox" name="has_medical_assistance" id="medical">
                    <label class="form-check-label" for="medical">Medical Assistance</label>
                </div>
                <div class="col-md-3 form-check form-check-inline">
                    <input class="form-check-input" type="checkbox" name="has_philhealth" id="philhealth">
                    <label class="form-check-label" for="philhealth">PhilHealth</label>
                </div>
                <div class="col-md-3 form-check form-check-inline">
                    <input class="form-check-input" type="checkbox" name="has_sss" id="sss">
                    <label class="form-check-label" for="sss">SSS</label>
                </div>
            </div>
        </div>
        
        <button type="submit" class="btn btn-primary px-5">Save Senior Citizen Record</button>
    </form>
</div>
{% endblock %}
