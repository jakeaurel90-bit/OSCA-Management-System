{% extends 'dashboard/base.html' %}
{% block content %}
<div class="container-fluid">
    <h2 class="mb-4">Register Senior Citizen</h2>
    <form method="POST" class="bg-white p-4 shadow-sm rounded">
        {% csrf_token %}
        <div class="row mb-3">
            <div class="col-md-4"><label>First Name</label><input type="text" name="first_name" class="form-control" required></div>
            <div class="col-md-4"><label>Last Name</label><input type="text" name="last_name" class="form-control" required></div>
            <div class="col-md-4"><label>Barangay</label><input type="text" name="barangay" class="form-control" required></div>
        </div>
        <div class="row mb-3">
            <div class="col-md-4"><label>Birthdate</label><input type="date" name="birthdate" class="form-control" required></div>
            <div class="col-md-4">
                <label>Sex</label>
                <select name="gender" class="form-control"><option value="M">Male</option><option value="F">Female</option></select>
            </div>
            <div class="col-md-4"><label>Phone Number</label><input type="text" name="phone_number" class="form-control" value="+63" required></div>
        </div>
        <button type="submit" class="btn btn-primary">Save Record</button>
    </form>
</div>
{% endblock %}
