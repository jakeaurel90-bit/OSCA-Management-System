{% extends 'dashboard/base.html' %}
{% block content %}
<div class="container-fluid p-4">
    <h2 class="mb-4 fw-bold">Register Senior Citizen</h2>
    <form method="POST" class="bg-white p-4 shadow-sm rounded border">
        {% csrf_token %}
        
        <div class="row mb-3">
            <div class="col-md-3">
                <label class="form-label">First Name <span class="text-danger"> *</span></label>
                <input type="text" name="first_name" class="form-control" required maxlength="30" pattern="[A-Za-z\s]+" title="Letters and spaces only.">
            </div>
            <div class="col-md-2">
                <label class="form-label">M.I.</label>
                <input type="text" name="middle_initial" class="form-control" maxlength="2" pattern="[A-Za-z]+" title="Letters only.">
            </div>
            <div class="col-md-4">
                <label class="form-label">Last Name<span class="text-danger"> *</span></label>
                <input type="text" name="last_name" class="form-control" required pattern="[A-Za-z\s]+" title="Letters and spaces only.">
            </div>
            <div class="col-md-3">
                <label class="form-label">Suffix</label>
                <input type="text" name="suffix" class="form-control" placeholder="e.g. Jr, Sr" pattern="[A-Za-z]+" title="Letters only.">
            </div>
        </div>

        <div class="row mb-3">
            <div class="col-md-6">
                <label class="form-label">Address<span class="text-danger"> *</span></label>
                <input type="text" name="address" class="form-control" required>
            </div>
            <div class="col-md-3">
                <label class="form-label">Civil Status<span class="text-danger"> *</span></label>
                <select name="civil_status" class="form-select" required>
                    <option value="Single">Single</option>
                    <option value="Married">Married</option>
                    <option value="Widowed">Widowed</option>
                    <option value="Separated">Separated</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label">Barangay<span class="text-danger"> *</span></label>
                <select name="barangay" class="form-select" required>
                    <option value="" disabled selected>Select Barangay...</option>
                    {% for b in barangays %}
                        <option value="{{ b.id }}">{{ b.name }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="row mb-3">
            <div class="col-md-3">
                <label class="form-label">Birthdate<span class="text-danger"> *</span></label>
                <input type="date" name="birthdate" class="form-control" required>
            </div>
            <div class="col-md-2">
                <label class="form-label">Age <span class="text-danger">*</span></label>
                <input type="number" name="age" class="form-control" min="60" max="150" required>
            </div>
            <div class="col-md-2">
                <label class="form-label">Sex</label>
                <select name="gender" class="form-select">
                    <option value="M">Male</option>
                    <option value="F">Female</option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label">Date Registered<span class="text-danger"> *</span></label>
                <input type="date" name="date_registered" class="form-control" value="{{ now|date:'Y-m-d' }}" required>
            </div>
            <div class="col-md-3">
                <label class="form-label">Phone Number<span class="text-danger"> *</span></label>
                <input type="tel" name="phone_number" class="form-control" value="+63" required maxlength="16" pattern="^\+63[0-9]{10}$">
            </div>
        </div>

        <div class="mb-4">
            <label class="form-label fw-bold">Benefits & Services Enrollment</label>
            <div class="row p-3 border rounded bg-light">
                <div class="col-md-3 form-check form-check-inline">
                    <input class="form-check-input" type="checkbox" name="has_pension" id="pension">
                    <label class="form-check-label" for="pension">Pension</label>
                </div>
                <div class="col-md-3 form-check form-check-inline">
                    <input class="form-check-input" type="checkbox" name="has_medical_assistance" id="medical">
                    <label class="form-check-label" for="medical">Medical Assistance</label>
                </div>
                <div class="col-md-3 form-check form-check-inline">
                    <input class="form-check-input" type="checkbox" name="has_philhealth" id="philhealth">
                    <label class="form-check-label" for="philhealth">PhilHealth</label>
                </div>
                <div class="col-md-3 form-check form-check-inline">
                    <input class="form-check-input" type="checkbox" name="has_sss" id="sss">
                    <label class="form-check-label" for="sss">SSS</label>
                </div>
            </div>
        </div>
        
        <button type="submit" class="btn btn-primary px-5">Save Senior Citizen Record</button>
    </form>
</div>
{% endblock %}
