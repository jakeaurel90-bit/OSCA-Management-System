{% extends 'dashboard/base.html' %}
{% load static %}

{% block content %}
<div class="container-fluid p-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Barangay Statistics Report</h2>
        <button onclick="window.print()" class="btn btn-primary d-print-none">
            <i class="bi bi-printer"></i> Print Report
        </button>
    </div>

    <div class="row">
        <div class="col-md-5">
            <div class="card p-4 shadow-sm">
                <table class="table table-hover">
                    <thead class="table-light">
                        <tr>
                            <th>Barangay</th>
                            <th>Total Seniors</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for stat in barangay_stats %}
                        <tr>
                            <td>{{ stat.name }}</td>
                            <td><span class="badge bg-primary">{{ stat.senior_count }}</span></td>
                        </tr>
                        {% empty %}
                        <tr><td colspan="2" class="text-center">No data available.</td></tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>

        <div class="col-md-7">
            <div class="card p-4 shadow-sm">
                <canvas id="barangayChart" height="250"></canvas>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    const ctx = document.getElementById('barangayChart').getContext('2d');
    const barangayChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: [{% for stat in barangay_stats %}'{{ stat.name }}',{% endfor %}],
            datasets: [{
                label: 'Senior Citizens per Barangay',
                data: [{% for stat in barangay_stats %}{{ stat.senior_count }},{% endfor %}],
                backgroundColor: '#3182ce',
                borderRadius: 5
            }]
        },
        options: {
            responsive: true,
            plugins: { legend: { display: false } },
            scales: { y: { beginAtZero: true, ticks: { precision: 0 } } }
        }
    });
</script>

<style>
    /* Ensure the print button is hidden when printing */
    @media print {
        .d-print-none { display: none !important; }
        .sidebar, .navbar { display: none !important; }
        .main-content { margin-left: 0 !important; }
        .card { box-shadow: none !important; border: 1px solid #ddd; }
    }
</style>
{% endblock %}
