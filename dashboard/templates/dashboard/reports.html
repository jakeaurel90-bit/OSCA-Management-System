{% extends 'dashboard/base.html' %}
{% load static %}

{% block content %}
<div class="container-fluid p-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">Barangay Statistics Report</h2>
        <button onclick="window.print()" class="btn btn-primary d-print-none">
            <i class="bi bi-printer"></i> Print Report
        </button>
    </div>

    <div class="row">
        <div class="col-md-5">
            <div class="card p-4 shadow-sm border-0">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>Barangay Name</th>
                            <th class="text-center">Total Seniors</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for stat in barangay_stats %}
                        <tr>
                            <td class="fw-semibold">{{ stat.name }}</td>
                            <td class="text-center">
                                <span class="badge bg-primary rounded-pill">{{ stat.senior_count }}</span>
                            </td>
                        </tr>
                        {% empty %}
                        <tr>
                            <td colspan="2" class="text-center text-muted">No barangay data available.</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>

        <div class="col-md-7">
            <div class="card p-4 shadow-sm border-0">
                <canvas id="barangayChart" height="250"></canvas>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    const ctx = document.getElementById('barangayChart').getContext('2d');
    const barangayChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: [{% for stat in barangay_stats %}'{{ stat.name }}',{% endfor %}],
            datasets: [{
                label: 'Registered Senior Citizens',
                data: [{% for stat in barangay_stats %}{{ stat.senior_count }},{% endfor %}],
                backgroundColor: '#3b82f6',
                borderColor: '#2563eb',
                borderWidth: 1,
                borderRadius: 4
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: { y: { beginAtZero: true, ticks: { precision: 0 } } }
        }
    });
</script>
{% endblock %}
