<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Add Senior Citizen</title>
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="card p-4 shadow-sm">
            <h3>Add New Senior Citizen</h3>
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3"><label>First Name</label><input type="text" name="first_name" class="form-control" required></div>
                <div class="mb-3"><label>Last Name</label><input type="text" name="last_name" class="form-control" required></div>
                <div class="mb-3">
                    <label>Gender</label>
                    <select name="gender" class="form-select">
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>
                </div>
                <div class="mb-3"><label>Barangay</label><input type="text" name="barangay" class="form-control" required></div>
                <div class="mb-3"><label>Birth Date</label><input type="date" name="birth_date" class="form-control" required></div>
                <button type="submit" class="btn btn-success">Save Record</button>
                <a href="{% url 'dashboard:home' %}" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div>
</body>
</html>
