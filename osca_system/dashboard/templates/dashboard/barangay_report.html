{% extends 'dashboard/base.html' %}
{% block content %}
<div class="container">
    <h3>Barangay Statistics</h3>
    <a href="{% url 'dashboard:export_reports' %}" class="btn btn-success">Export CSV</a>
    <table class="table">
        <thead><tr><th>Barangay</th><th>Total</th></tr></thead>
        <tbody>
            {% for item in report_data %}
            <tr><td>{{ item.barangay }}</td><td>{{ item.total }}</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
