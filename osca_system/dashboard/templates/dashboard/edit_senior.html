{% extends 'dashboard/base.html' %}
{% block content %}
<div class="card p-4 shadow-sm">
    <h3>Edit Senior Citizen</h3>
    <form method="POST">
        {% csrf_token %}
        <div class="mb-3"><label>First Name</label><input type="text" name="first_name" value="{{ member.first_name }}" class="form-control" required></div>
        <div class="mb-3"><label>Last Name</label><input type="text" name="last_name" value="{{ member.last_name }}" class="form-control" required></div>
        <div class="mb-3"><label>Gender</label>
            <select name="gender" class="form-select">
                <option value="Male" {% if member.gender == 'Male' %}selected{% endif %}>Male</option>
                <option value="Female" {% if member.gender == 'Female' %}selected{% endif %}>Female</option>
            </select>
        </div>
        <div class="mb-3"><label>Barangay</label><input type="text" name="barangay" value="{{ member.barangay }}" class="form-control" required></div>
        <div class="mb-3"><label>Birth Date</label><input type="date" name="birth_date" value="{{ member.birth_date|date:'Y-m-d' }}" class="form-control" required></div>
        <button type="submit" class="btn btn-warning">Update Record</button>
        <a href="{% url 'dashboard:list_seniors' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
