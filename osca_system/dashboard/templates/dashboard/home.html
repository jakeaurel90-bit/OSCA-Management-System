{% extends 'dashboard/base.html' %}
{% block content %}
<div class="grid grid-cols-1 md:grid-cols-3 gap-6">
    <div class="bg-blue-500 p-6 rounded-lg text-white">
        <h2 class="text-lg">Total Registered</h2>
        <p class="text-4xl font-bold">{{ total_seniors }}</p>
    </div>
    <div class="bg-green-500 p-6 rounded-lg text-white">
        <h2 class="text-lg">Male Seniors</h2>
        <p class="text-4xl font-bold">{{ male_seniors }}</p>
    </div>
    <div class="bg-pink-500 p-6 rounded-lg text-white">
        <h2 class="text-lg">Female Seniors</h2>
        <p class="text-4xl font-bold">{{ female_seniors }}</p>
    </div>
</div>
{% endblock %}
